steps:
  # Build container image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - 'gcr.io/$PROJECT_ID/grantscout:$COMMIT_SHA'
      - -t
      - 'gcr.io/$PROJECT_ID/grantscout:latest'
      - .

  # Push to Container Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - 'gcr.io/$PROJECT_ID/grantscout:$COMMIT_SHA'

  # Deploy to Cloud Run (sensor)
  - name: gcr.io/cloud-builders/gke-deploy
    args:
      - run
      - --filename=k8s/
      - --image=gcr.io/$PROJECT_ID/grantscout:$COMMIT_SHA
      - --location=us-central1
      - --cluster=grantscout-cluster

images:
  - 'gcr.io/$PROJECT_ID/grantscout:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/grantscout:latest'

timeout: 1800s
