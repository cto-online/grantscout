name: ci
on: [push, pull_request]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # .npmrc sets omit=dev (prod-safe for Docker); CI needs the dev tooling.
      - run: npm ci --include=dev
      - run: npm run typecheck
      - run: npm test
